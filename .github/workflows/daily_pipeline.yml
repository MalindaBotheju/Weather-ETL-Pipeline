name: Daily Weather ETL Pipeline

# 1. When should this run?
on:
  schedule:
    - cron: '0 2 * * *' # This means: Run at 2:00 AM UTC every single day
  workflow_dispatch:    # This adds a "Run Now" button in GitHub so we can test it

jobs:
  run-pipeline:
    runs-on: ubuntu-latest # 2. GitHub gives us a free Linux server

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3 # 3. Downloads your Python files onto the server

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'  # 4. Installs Python

      - name: Install Dependencies
        run: |
          pip install requests    # 5. Installs the requests library (sqlite3 is built-in!)

      - name: Run ETL Pipeline
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python pipeline.py